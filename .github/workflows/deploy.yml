name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.156.149
          username: ssh_mypiggybox
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/mypiggybox/htdocs/www.mypiggybox.com

            git pull origin main

            npm ci --prefer-offline
            npm run build

            /usr/bin/php8.5 /usr/local/bin/composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction

            /usr/bin/php8.5 artisan optimize:clear
            /usr/bin/php8.5 artisan migrate --force
            /usr/bin/php8.5 artisan storage:link --force

            /usr/bin/php8.5 artisan optimize

            /usr/bin/php8.5 artisan queue:restart